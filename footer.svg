<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-footer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12072B" />
      <stop offset="50%" stop-color="#3b1466" />
      <stop offset="100%" stop-color="#4A4A4A" />
    </linearGradient>
    <style>
      .wave-footer { fill: url(#grad-footer); animation: moveGradient 6s ease infinite alternate; }
      @keyframes moveGradient { 0% { x1: 0%; x2: 100%; } 100% { x1: 100%; x2: 200%; } }
    </style>
  </defs>
  <!-- Ola invertida para la sección de abajo (footer) con la altura exacta de 100px -->
  <path class="wave-footer" d="M 0 100 L 0 40 C 150 -10, 300 70, 450 50 C 600 30, 700 60, 800 40 L 800 100 Z" />
</svg>
